# NGINX reverse proxy for VCM.
#   - Terminates TLS, forwards real client IP.
#   - Set VCM_TRUSTED_PROXIES to the NGINX host/container IP so the app trusts
#     X-Forwarded-For; set VCM_REAL_IP_HEADERS=x-forwarded-for.
upstream vcm { server vcm:8000; }

server {
    listen 443 ssl http2;
    server_name vcm.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location / {
        proxy_pass http://vcm;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
server {
    listen 80;
    server_name vcm.example.com;
    return 301 https://$host$request_uri;
}
