{% macro icon(name, size=16) %}
<svg class="icon icon-{{ name }}" width="{{ size }}" height="{{ size }}" viewBox="0 0 24 24"
     fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
     stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2px">
{%- if name == 'key' -%}
  <circle cx="8" cy="15" r="4"/><path d="M10.85 12.15 19 4"/><path d="M15 5l3 3"/><path d="M18 8l2-2"/>
{%- elif name == 'cert' -%}
  <path d="M6 2h9l5 5v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1Z"/><path d="M14 2v6h6"/>
  <path d="M8 13h6"/><path d="M8 17h4"/>
{%- elif name == 'warn' -%}
  <path d="M12 3 2 20h20L12 3Z"/><path d="M12 10v5"/><path d="M12 18h.01"/>
{%- elif name == 'ok' -%}
  <path d="M12 2.5 4.5 5.5v5.2c0 4.6 3.1 8.4 7.5 9.8 4.4-1.4 7.5-5.2 7.5-9.8V5.5L12 2.5Z"/>
  <path d="M9 12l2 2 4-4"/>
{%- elif name == 'left' -%}
  <path d="M15 5l-7 7 7 7"/>
{%- elif name == 'down' -%}
  <path d="M12 4v13"/><path d="M6 11l6 6 6-6"/>
{%- endif -%}
</svg>
{% endmacro %}

{# Like rated_select but shows the platform's own keyword as the label. #}
{% macro vendor_select(name, opts, selected) %}
<select name="{{ name }}" data-vendor-field>
  {% for o in opts %}
  <option value="{{ o.value }}" data-sec="{{ o.security }}"
    {% if o.value == selected %}selected{% endif %}>{{ o.label }} — {{ o.security }}</option>
  {% endfor %}
</select>
{% endmacro %}

{% macro rated_select(name, opts, selected) %}
<select name="{{ name }}">
  {% for o in opts %}
  <option value="{{ o.value }}" data-sec="{{ o.security }}"
    {% if o.value == selected %}selected{% endif %}>
    {{ o.value }} — {{ o.security }}{% if o.note %} · {{ o.note }}{% endif %}
  </option>
  {% endfor %}
</select>
{% endmacro %}
