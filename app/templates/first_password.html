{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:440px;margin:3rem auto;">
  <h2>Set a new password</h2>
  <p class="muted">Your account requires a password change before you continue to MFA setup.</p>
  <form method="post" action="/account/first-password">
    <label>Current (temporary) password</label>
    <input type="password" name="current" autocomplete="current-password" autofocus>
    <div class="row">
      <div><label>New password</label><input type="password" name="new" autocomplete="new-password"></div>
      <div><label>Confirm new</label><input type="password" name="confirm" autocomplete="new-password"></div>
    </div>
    <button class="btn" style="margin-top:.8rem;width:100%">Change password &amp; continue</button>
  </form>
</div>
{% endblock %}
